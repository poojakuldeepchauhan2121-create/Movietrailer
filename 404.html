<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — MovieTrailers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #141414;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }

        /* ─── BACKGROUND ANIMATION ─────────────────────────────── */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-effects .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: pulse 8s ease-in-out infinite;
        }

        .bg-effects .glow2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.05) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* ─── FLOATING CLAPPERBOARD EMOJIS ─────────────────────── */
        .floating-icons {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-icons span {
            position: absolute;
            font-size: 2rem;
            opacity: 0.06;
            animation: floatUp 20s infinite linear;
        }

        .floating-icons span:nth-child(1) {
            left: 5%;
            animation-duration: 22s;
            animation-delay: 0s;
        }
        .floating-icons span:nth-child(2) {
            left: 15%;
            animation-duration: 18s;
            animation-delay: 2s;
            font-size: 1.6rem;
        }
        .floating-icons span:nth-child(3) {
            left: 25%;
            animation-duration: 25s;
            animation-delay: 4s;
        }
        .floating-icons span:nth-child(4) {
            left: 35%;
            animation-duration: 20s;
            animation-delay: 1s;
            font-size: 1.4rem;
        }
        .floating-icons span:nth-child(5) {
            left: 45%;
            animation-duration: 23s;
            animation-delay: 3s;
        }
        .floating-icons span:nth-child(6) {
            left: 55%;
            animation-duration: 19s;
            animation-delay: 5s;
            font-size: 1.8rem;
        }
        .floating-icons span:nth-child(7) {
            left: 65%;
            animation-duration: 21s;
            animation-delay: 2s;
        }
        .floating-icons span:nth-child(8) {
            left: 75%;
            animation-duration: 24s;
            animation-delay: 4s;
            font-size: 1.3rem;
        }
        .floating-icons span:nth-child(9) {
            left: 85%;
            animation-duration: 17s;
            animation-delay: 1s;
        }
        .floating-icons span:nth-child(10) {
            left: 92%;
            animation-duration: 26s;
            animation-delay: 3s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.06;
            }
            90% {
                opacity: 0.06;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* ─── CONTENT ────────────────────────────────────────────── */
        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .content .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e50914;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .content .logo span {
            color: #fff;
            font-weight: 300;
        }

        .content .big-icon {
            font-size: 6rem;
            margin-bottom: 1rem;
            display: block;
            animation: shake 3s ease-in-out infinite;
        }

        @keyframes shake {
            0%,
            100% {
                transform: rotate(-5deg) scale(1);
            }
            50% {
                transform: rotate(5deg) scale(1.05);
            }
        }

        .content h1 {
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900;
            color: #e50914;
            text-shadow: 0 0 60px rgba(229, 9, 20, 0.15);
            line-height: 1;
            margin-bottom: 0.25rem;
            letter-spacing: -2px;
        }

        .content .sub-code {
            font-size: 1rem;
            color: #444;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
        }

        .content h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .content p {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .content .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .content .btn {
            padding: 0.75rem 2.2rem;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #e50914;
            color: #fff;
        }

        .btn-primary:hover {
            background: #f40612;
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(229, 9, 20, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e5e5e5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ─── SUGGESTED TRAILERS ────────────────────────────────── */
        .suggestions {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #222;
            width: 100%;
            max-width: 600px;
        }

        .suggestions .label {
            font-size: 0.75rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
        }

        .suggestions .row {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestions .mini-card {
            background: #1a1a2e;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #aaa;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .suggestions .mini-card:hover {
            border-color: #e50914;
            color: #fff;
            transform: translateY(-2px);
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .content .big-icon {
                font-size: 4rem;
            }
            .content h1 {
                font-size: 3.5rem;
            }
            .content .btn {
                padding: 0.6rem 1.5rem;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }
            .content .btn-group {
                flex-direction: column;
                width: 100%;
            }
            .floating-icons span {
                font-size: 1.2rem !important;
            }
            .suggestions .row {
                gap: 0.4rem;
            }
            .suggestions .mini-card {
                font-size: 0.65rem;
                padding: 0.3rem 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ─── BACKGROUND EFFECTS ────────────────────────────────── -->
    <div class="bg-effects">
        <div class="glow"></div>
        <div class="glow2"></div>
    </div>

    <div class="floating-icons">
        <span>🎬</span>
        <span>📽️</span>
        <span>🎞️</span>
        <span>🍿</span>
        <span>🎥</span>
        <span>📺</span>
        <span>🎭</span>
        <span>🌟</span>
        <span>🎪</span>
        <span>🏆</span>
    </div>

    <!-- ─── CONTENT ────────────────────────────────────────────── -->
    <div class="content">
        <div class="logo">Movie<span>Trailers</span></div>

        <span class="big-icon">🎬</span>
        <h1>404</h1>
        <div class="sub-code">PAGE NOT FOUND</div>

        <h2>Oops! This trailer is missing.</h2>
        <p>
            The page you're looking for doesn't exist or may have been moved.
            Don't worry — there are plenty of other great trailers to watch!
        </p>

        <div class="btn-group">
            <a href="/" class="btn btn-primary">🏠 Back to Home</a>
            <a href="/trailers" class="btn btn-secondary">🎞️ Browse All Trailers</a>
        </div>

        <!-- ─── SUGGESTED TRAILERS ──────────────────────────────── -->
        <div class="suggestions">
            <div class="label">🎯 Quick Picks</div>
            <div class="row" id="suggestionsRow">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>

    <script>
        // ─── SAME DATA AS HOME PAGE ──────────────────────────────
        const TRAILERS = [{
            slug: 'interstellar',
            title: 'Interstellar',
            year: '2014',
            genre: 'Sci-Fi, Drama'
        }, {
            slug: 'inception',
            title: 'Inception',
            year: '2010',
            genre: 'Sci-Fi, Action'
        }, {
            slug: 'dark-knight',
            title: 'The Dark Knight',
            year: '2008',
            genre: 'Action, Crime'
        }, {
            slug: 'dune-part-two',
            title: 'Dune: Part Two',
            year: '2024',
            genre: 'Sci-Fi, Adventure'
        }, {
            slug: 'deadpool-wolverine',
            title: 'Deadpool & Wolverine',
            year: '2024',
            genre: 'Action, Comedy'
        }, {
            slug: 'gladiator-2',
            title: 'Gladiator II',
            year: '2024',
            genre: 'Action, Drama'
        }];

        function getTrailerUrl(slug) {
            return `/trailers/${slug}.html`;
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestionsRow');
            // Pick 4 random trailers
            const shuffled = [...TRAILERS].sort(() => Math.random() - 0.5);
            const picks = shuffled.slice(0, 4);

            container.innerHTML = picks.map(t => `
                <a href="${getTrailerUrl(t.slug)}" class="mini-card">
                    🎬 ${t.title}
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderSuggestions);
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            renderSuggestions();
        }
    </script>

</body>
</html>
